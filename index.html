<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TempInbox (Vmail.dev)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #6c5ce7;
            --light: #f5f6fa;
            --dark: #2d3436;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; }
        
        body {
            background: linear-gradient(135deg, #1e1e2e 0%, #2a2a40 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: white;
            position: relative;
        }

        /* 右上角圆角方块图标 */
        .top-right-icons {
            position: absolute;
            top: 25px;
            right: 25px;
            display: flex;
            gap: 12px;
            z-index: 100;
        }
        .icon-btn {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(103, 232, 249, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            color: #67e8f9;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(103, 232, 249, 0.4);
        }
        .icon-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 25px rgba(103, 232, 249, 0.7);
            background: rgba(103, 232, 249, 0.15);
        }

        /* Telegram 蓝色风格 */
        .icon-btn.telegram {
            border-color: #60a5fa;
            color: #60a5fa;
            box-shadow: 0 0 15px rgba(96, 165, 250, 0.5);
        }
        .icon-btn.telegram:hover {
            box-shadow: 0 0 25px rgba(96, 165, 250, 0.8);
        }

        /* GitHub 风格 */
        .icon-btn.github {
            border-color: #9ca3af;
            color: #d1d5db;
            box-shadow: 0 0 15px rgba(156, 163, 175, 0.4);
        }
        .icon-btn.github:hover {
            border-color: #f3f4f6;
            color: white;
            box-shadow: 0 0 25px rgba(209, 213, 219, 0.6);
        }

        .container { width: 100%; max-width: 620px; }
        .card {
            background: rgba(255,255,255,0.95);
            color: #2d3436;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: white;
            padding: 22px;
            text-align: center;
        }
        .header h1 { font-size: 1.55rem; display: flex; align-items: center; justify-content: center; gap: 12px; }
        
        .content { padding: 25px; }
        .email-section, .inbox-section {
            background: #f8f9fc;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .email-display {
            font-size: 1.15rem;
            background: white;
            padding: 14px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid #e0e0e0;
            word-break: break-all;
            min-height: 54px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .actions { 
            display: flex; 
            gap: 10px; 
            justify-content: center; 
            flex-wrap: wrap; 
            margin-top: 18px; 
        }
        .btn {
            padding: 11px 22px;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary { background: #6c5ce7; color: white; }
        .btn-secondary { background: #00cec9; color: white; }
        .btn-refresh { background: #fdcb6e; color: white; }
        .btn-delete { background: #e74c3c; color: white; }

        .email-list { max-height: 320px; overflow-y: auto; }
        .empty-inbox { text-align: center; padding: 50px 20px; color: #888; }
        .status-bar {
            display: flex; align-items: center; gap: 10px;
            padding: 12px; background: #f0efff; border-radius: 10px; margin-top: 15px;
        }
        .status-dot {
            width: 12px; height: 12px; border-radius: 50%; background: #00b894;
        }
        .status-dot.loading { background: #fdcb6e; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100% {opacity:1} 50% {opacity:0.5} }
        
        .error-message, .success-message {
            padding: 12px; border-radius: 8px; margin-top: 12px; text-align: center; font-size: 0.9rem;
        }
        .error-message { background: #fee; color: #e74c3c; }
        .success-message { background: #e6f7e6; color: #00b894; }
    </style>
</head>
<body>
    <!-- 右上角三个圆角方块图标 -->
    <div class="top-right-icons">
        <div class="icon-btn" id="refresh-icon" title="手动刷新">
            <i class="fas fa-sync-alt"></i>
        </div>
        <div class="icon-btn telegram" id="telegram-icon" title="联系我 (Telegram)">
            <i class="fab fa-telegram-plane"></i>
        </div>
        <div class="icon-btn github" id="github-icon" title="GitHub">
            <i class="fab fa-github"></i>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <div class="header">
                <h1><i class="fas fa-envelope"></i> TempInbox (Vmail.dev)</h1>
                <p>快速、安全的临时邮箱服务</p>
            </div>
            <div class="content">
                <div class="email-section">
                    <div class="email-display" id="email-address">
                        点击下方按钮生成邮箱
                    </div>
                    <div class="error-message" id="email-error" style="display:none;"></div>
                    <div class="success-message" id="email-success" style="display:none;"></div>
                    <div class="actions">
                        <button class="btn btn-primary" id="generate-btn">
                            <i class="fas fa-plus-circle"></i> 生成邮箱
                        </button>
                        <button class="btn btn-secondary" id="copy-btn">
                            <i class="fas fa-copy"></i> 复制地址
                        </button>
                        <button class="btn btn-delete" id="clear-storage-btn" style="display:none;">
                            <i class="fas fa-eraser"></i> 清除数据
                        </button>
                    </div>
                </div>

                <div class="inbox-section">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
                        <div style="font-size:1.25rem;font-weight:600;color:#2d3436;">收件箱 
                            <span id="email-count" style="background:#6c5ce7;color:white;padding:3px 11px;border-radius:999px;font-size:0.82rem;">0</span>
                        </div>
                    </div>
                    <div class="email-list" id="email-list">
                        <div class="empty-inbox">
                            <i class="fas fa-inbox" style="font-size:3rem;color:#ddd;margin-bottom:15px;"></i>
                            <p>收件箱为空</p>
                            <p style="font-size:0.95rem;">发送邮件到上方地址即可在这里显示</p>
                        </div>
                    </div>
                    <div class="status-bar">
                        <div class="status-dot" id="status-dot"></div>
                        <div id="status-text">准备就绪</div>
                    </div>
                </div>
            </div>
            <div style="text-align:center;padding:18px;color:#777;font-size:0.88rem;border-top:1px solid #eee;">
                邮件由 <a href="https://vmail.dev" target="_blank" style="color:#6c5ce7;">Vmail.dev</a> 提供 • 自动销毁
            </div>
        </div>
    </div>

    <script>
        // ==================== 请在这里修改 ====================
        const API_KEY = 'vmail_0T6OOdjA6VhmYkrKAuTZZZcZEEc36ijB';   // ←←← 改成你的 Vmail API Key

        let currentEmail = '';
        let mailboxId = '';
        let refreshInterval = null;
        let emailCache = [];

        const emailDisplay = document.getElementById('email-address');
        const generateBtn = document.getElementById('generate-btn');
        const copyBtn = document.getElementById('copy-btn');
        const clearBtn = document.getElementById('clear-storage-btn');
        const emailList = document.getElementById('email-list');
        const emailCount = document.getElementById('email-count');
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');
        const emailError = document.getElementById('email-error');
        const emailSuccess = document.getElementById('email-success');

        const baseUrl = 'https://vmail.dev/api/v1';

        function updateStatus(msg, type = '') {
            statusText.textContent = msg;
            statusDot.className = 'status-dot';
            if (type === 'loading') statusDot.classList.add('loading');
        }

        function showError(msg) {
            emailError.textContent = msg;
            emailError.style.display = 'block';
            setTimeout(() => emailError.style.display = 'none', 5000);
        }

        function showSuccess(msg) {
            emailSuccess.textContent = msg;
            emailSuccess.style.display = 'block';
            setTimeout(() => emailSuccess.style.display = 'none', 4000);
        }

        async function generateRandomEmail() {
            if (!API_KEY || API_KEY.includes('你的真实')) {
                showError('请先替换代码中的 API_KEY 为你的真实 Vmail Key');
                return;
            }
            updateStatus('正在生成...', 'loading');
            try {
                const res = await fetch(`${baseUrl}/mailboxes`, {
                    method: 'POST',
                    headers: { 'X-API-Key': API_KEY, 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                });
                if (!res.ok) throw new Error('创建失败');
                const data = await res.json();
                currentEmail = data.data?.address || data.address;
                mailboxId = data.data?.id || data.id;

                emailDisplay.textContent = currentEmail;
                clearBtn.style.display = 'inline-block';
                showSuccess('邮箱生成成功！');
                checkEmails();
                startPolling();
            } catch (err) {
                showError('生成失败：' + err.message);
            }
        }

        async function checkEmails() {
            if (!mailboxId) return;
            updateStatus('检查邮件...', 'loading');
            try {
                const res = await fetch(`${baseUrl}/mailboxes/${mailboxId}/messages`, {
                    headers: { 'X-API-Key': API_KEY }
                });
                const result = await res.json();
                emailCache = result.data || [];
                emailCount.textContent = emailCache.length;

                if (emailCache.length === 0) {
                    emailList.innerHTML = `<div class="empty-inbox"><i class="fas fa-inbox" style="font-size:3rem;color:#ddd;"></i><p>收件箱为空</p></div>`;
                } else {
                    renderEmailList();
                }
            } catch (e) {}
            updateStatus('就绪');
        }

        function renderEmailList() {
            emailList.innerHTML = emailCache.map(m => `
                <div style="background:white;padding:14px;border-radius:10px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,0.05);">
                    <div style="font-weight:600;">${m.from || '未知发件人'}</div>
                    <div style="color:#555;">${m.subject || '无主题'}</div>
                </div>
            `).join('');
        }

        function startPolling() {
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(checkEmails, 15000);
        }

        // 按钮事件
        generateBtn.addEventListener('click', generateRandomEmail);
        copyBtn.addEventListener('click', () => {
            if (currentEmail) navigator.clipboard.writeText(currentEmail).then(() => showSuccess('已复制'));
        });
        clearBtn.addEventListener('click', () => location.reload());

        // 右上角图标点击
        document.getElementById('refresh-icon').addEventListener('click', checkEmails);

        document.getElementById('telegram-icon').addEventListener('click', () => {
            // 这里改成你的 Telegram 链接（推荐）
            window.open('https://t.me/icc469', '_blank');   // ←←← 请把“你的用户名”改成你的 Telegram
            // 或者使用 alert：
            // alert('欢迎通过 Telegram 联系我！\n\n我的 Telegram: @icc469');
        });

        document.getElementById('github-icon').addEventListener('click', () => {
            window.open('https://github.com/aqiu301', '_blank');   // ←←← 改成你的 GitHub 地址
        });

        // 初始化
        updateStatus('准备就绪');
    </script>
</body>
</html>
